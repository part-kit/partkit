name: ci
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: partkit
          POSTGRES_PASSWORD: partkit
          POSTGRES_DB: partkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U partkit" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
      - run: npm test
        env:
          PARTKIT_TEST_DATABASE_URL: postgresql://partkit:partkit@localhost:5432/partkit_test
